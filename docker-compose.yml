services:
  whisper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whisper-server
    ports:
      - "8000:8000"
    volumes:
      - ./models:/models:ro
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
  networks:
    app-network:
      external: true
      name: app-network
